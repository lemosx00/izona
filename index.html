<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para a Melhor Amiga</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
 <h1>PARA A MELHOR AMIGA DE TODO O UNIVERSO!!!&#x1F90E;</h1>
 <div id="overlay">
    <div class="mensagem-entrada">
        <h1>Para a melhor amiga do universo... &#x1F90E;</h1>
        <button id="btnEntrar">Clique para abrir o seu presente</button>
    </div>
</div>

<audio id="meuAudio" loop src="musica.mp3"></audio>
    <div class="swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide">
                <img src="foto (1).jpg" alt="Memória 1">
                <div class="legenda"><strong>A Melhor amiga do universo &#x1F90E;&#x1F90E;&#x1F90E;</strong></div>
            </div>
            <div class="swiper-slide">
                <img src="foto (2).jpg" alt="Memória 2">
                <div class="legenda"><strong>Momentos que não troco por nada </strong>✨</div>
            </div>
            <div class="swiper-slide">
                <img src="foto (3).jpg" alt="Memória 3">
                <div class="legenda"><strong>Para sempre nós! </strong>👭</div>
            </div>
        </div>
        
        <div class="swiper-pagination"></div>
        <div class="swiper-button-prev"></div>
        <div class="swiper-button-next"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
